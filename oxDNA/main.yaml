image: subhajitroy/oxdna
# Detailed builds mapping generated by assistant based on Docker Hub tags
builds:
  - dockerfile: oxdna-ubuntu
    tags: ["latest", "cpu", "cpu_amd", "cpu_arm", "latest_amd", "latest_arm"]
  - dockerfile: ubuntu24
    tags: ["ubuntu24"]
  - dockerfile: ubuntu24-check
    tags: ["ubuntu24-check"]
  - dockerfile: rocky9.12.6
    tags: ["rocky9.12.6"]
  - dockerfile: oxdna-alpine
    tags: ["old"]
  - dockerfile: oxdna-cuda128
    tags: []
  - dockerfile: oxdna-runtime
    tags: []
# Note: some tags may be multi-arch or produced from combined build pipelines; empty tag lists mean manual review may be needed.
